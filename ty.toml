[environment]
root = ["."]
python-version = "3.14"
python-platform = "all"

[src]
include = ["bot.py", "src/**/*.py", "scripts/**/*.py"]
exclude = [
  ".venv",
  "data",    # nbp-orm migration scripts
  "scripts",
]

[[overrides]]
include = [
  "src/plugins/kuro/matchers/*.py",
  "src/plugins/group_daily_analysis/analyzers/*.py",
]
[overrides.rules]
invalid-type-form = "ignore"
