name: Docker Yogurt

on:
  push:
    branches:
      - master
    paths:
      - "docker/Dockerfile.yogurt"
      - ".github/workflows/docker-yogurt.yml"
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  check:
    name: Check Upstream Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.upstream.outputs.version }}
      should_build: ${{ steps.upstream.outputs.should_build }}

    steps:
      - name: Cache Version
        id: cache
        uses: actions/cache@v5
        with:
          path: version.txt
          key: yogurt-release-version-${{ github.run_id }}
          restore-keys: |
            yogurt-release-version-

      - name: Get upstream version
        id: upstream
        run: |
          PREVIOUS_VERSION=$(cat version.txt || echo "none")
          echo "Previous version: $PREVIOUS_VERSION"
          VERSION=$(curl -s "https://api.github.com/repos/SaltifyDev/yogurt-releases/releases/latest" | jq -r '.tag_name')
          echo "$VERSION" > version.txt
          echo "Upstream version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            if [ "$VERSION" != "$PREVIOUS_VERSION" ]; then
              echo "New version detected on schedule, should build"
              echo "should_build=true" >> $GITHUB_OUTPUT
            else
              echo "No new version on schedule, skipping build"
              echo "should_build=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Non-schedule trigger ($GITHUB_EVENT_NAME), should build"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  docker:
    name: Docker Hub Release
    runs-on: ubuntu-latest
    needs: [check]
    if: needs.check.outputs.should_build == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Tags
        uses: docker/metadata-action@v5
        id: metadata
        with:
          images: wyf7685/bot7685
          tags: type=raw,value=yogurt

      - name: Build and Publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.yogurt
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.check.outputs.version }}
